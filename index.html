<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LogicWorks.AI SEO Agents</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1a;
            --bg-secondary: #131b2a;
            --bg-card: #0f1724;
            --border: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --accent-amber: #f59e0b;
            --accent-red: #ef4444;
            --accent-pink: #ec4899;
            --accent-indigo: #6366f1;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        .header {
            background: linear-gradient(180deg, rgba(30,41,59,0.8) 0%, rgba(15,23,36,0.95) 100%);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .brand-text h1 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .brand-text p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            padding: 0.4rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--accent-green);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .quick-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }

        .quick-stat {
            text-align: center;
            padding: 0.5rem;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }

        .quick-stat .value {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .quick-stat .label {
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .container { padding: 1rem; }
        .section { margin-bottom: 1.5rem; }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
        }

        .badge {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .agents-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .agent-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .agent-card:hover {
            transform: translateY(-2px);
            border-color: var(--agent-color);
        }

        .agent-avatar {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            background: var(--agent-bg);
            box-shadow: 0 4px 15px -3px var(--agent-bg);
        }

        .agent-card h3 {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .agent-card .role {
            font-size: 0.7rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .agent-stats {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }

        .agent-stat {
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        .agent-card[data-agent="coordinator"] { --agent-color: var(--accent-blue); --agent-bg: rgba(59, 130, 246, 0.2); }
        .agent-card[data-agent="researcher"] { --agent-color: var(--accent-purple); --agent-bg: rgba(139, 92, 246, 0.2); }
        .agent-card[data-agent="content"] { --agent-color: var(--accent-cyan); --agent-bg: rgba(6, 182, 212, 0.2); }
        .agent-card[data-agent="local"] { --agent-color: var(--accent-amber); --agent-bg: rgba(245, 158, 11, 0.2); }
        .agent-card[data-agent="technical"] { --agent-color: var(--accent-red); --agent-bg: rgba(239, 68, 68, 0.2); }
        .agent-card[data-agent="analytics"] { --agent-color: var(--accent-green); --agent-bg: rgba(34, 197, 94, 0.2); }
        .agent-card[data-agent="link"] { --agent-color: var(--accent-pink); --agent-bg: rgba(236, 72, 153, 0.2); }
        .agent-card[data-agent="ecommerce"] { --agent-color: var(--accent-indigo); --agent-bg: rgba(99, 102, 241, 0.2); }

        .project-list { display: flex; flex-direction: column; gap: 0.75rem; }

        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .project-card:hover { border-color: var(--border-light); }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .project-header h4 {
            font-size: 0.95rem;
            font-weight: 600;
            flex: 1;
        }

        .project-progress { text-align: right; }
        .project-progress .pct {
            font-size: 1.25rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .project-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .project-tag {
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            color: var(--text-secondary);
        }

        .progress-bar {
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient-1);
            border-radius: 3px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
        }

        .modal.active { display: block; }

        .modal-content {
            background: var(--bg-secondary);
            min-height: 100vh;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--bg-secondary);
            z-index: 10;
        }

        .modal-close {
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            font-size: 1.25rem;
            cursor: pointer;
        }

        .modal-body { padding: 1.25rem; }

        .detail-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .task-list { display: flex; flex-direction: column; gap: 0.75rem; }

        .task-item {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1rem;
            border-left: 3px solid var(--accent-green);
        }

        .task-item.pending { border-left-color: var(--accent-amber); }

        .task-name { font-size: 0.9rem; font-weight: 500; }
        .task-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }

        .file-list { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.75rem; }

        .file-item {
            background: rgba(255,255,255,0.03);
            padding: 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .file-item:hover { background: rgba(255,255,255,0.06); }

        .file-icon {
            width: 36px;
            height: 36px;
            background: var(--bg-secondary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .file-info { flex: 1; }
        .file-name { font-size: 0.8rem; font-weight: 500; }
        .file-size { font-size: 0.7rem; color: var(--text-muted); }

        .file-viewer {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-primary);
            z-index: 2000;
            overflow-y: auto;
        }

        .file-viewer.active { display: block; }

        .file-viewer-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--bg-secondary);
        }

        .file-content {
            background: var(--bg-card);
            padding: 1.25rem;
            border-radius: 12px;
            font-family: monospace;
            font-size: 0.8rem;
            line-height: 1.7;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 60vh;
            overflow-y: auto;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(19, 27, 42, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 0.75rem;
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            padding: 0.5rem 1rem;
            color: var(--text-muted);
            font-size: 0.65rem;
            cursor: pointer;
        }

        .nav-item.active { color: var(--accent-blue); }
        .nav-item .icon { font-size: 1.25rem; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-top">
            <div class="brand">
                <div class="brand-icon">🎯</div>
                <div class="brand-text">
                    <h1>LogicWorks.AI</h1>
                    <p>SEO Agent Team</p>
                </div>
            </div>
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>Live</span>
            </div>
        </div>
        <div class="quick-stats">
            <div class="quick-stat"><div class="value">8</div><div class="label">Agents</div></div>
            <div class="quick-stat"><div class="value">2</div><div class="label">Projects</div></div>
            <div class="quick-stat"><div class="value">12</div><div class="label">Tasks</div></div>
            <div class="quick-stat"><div class="value">156K</div><div class="label">Tokens</div></div>
        </div>
    </header>

    <div class="container">
        <div class="section">
            <div class="section-header">
                <div class="section-title"><span class="icon">🤖</span> Agent Team</div>
                <span class="badge">8 Active</span>
            </div>
            <div class="agents-grid" id="agentList"></div>
        </div>

        <div class="section">
            <div class="section-header">
                <div class="section-title"><span class="icon">📁</span> Projects</div>
                <span class="badge">2 Active</span>
            </div>
            <div class="project-list" id="projectList"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showTab('agents')">
            <span class="icon">🤖</span>
            <span>Agents</span>
        </div>
        <div class="nav-item" onclick="showTab('projects')">
            <span class="icon">📁</span>
            <span>Projects</span>
        </div>
        <div class="nav-item" onclick="showTab('analytics')">
            <span class="icon">📊</span>
            <span>Analytics</span>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Details</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <div class="file-viewer" id="fileViewer">
        <div class="file-viewer-header">
            <h3 id="fileViewerTitle">File</h3>
            <button class="modal-close" onclick="closeFileViewer()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="file-content" id="fileContent"></div>
            <button class="btn-primary" onclick="copyFileContent()">Copy to Clipboard</button>
        </div>
    </div>

    <script>
        const agents = [
            { id: 'coordinator', name: 'Coordinator', emoji: '🎯', role: 'Orchestrates team workflow', status: 'idle', tasks: 24, tokens: '45K', color: 'coordinator' },
            { id: 'researcher', name: 'Researcher', emoji: '🔬', role: 'Keyword & competitor analysis', status: 'idle', tasks: 18, tokens: '38K', color: 'researcher' },
            { id: 'content', name: 'Content', emoji: '✍️', role: 'Content strategy & briefs', status: 'idle', tasks: 15, tokens: '42K', color: 'content' },
            { id: 'local', name: 'Local SEO', emoji: '📍', role: 'GBP, citations, reviews', status: 'idle', tasks: 8, tokens: '28K', color: 'local' },
            { id: 'technical', name: 'Technical', emoji: '⚙️', role: 'Site audits & performance', status: 'idle', tasks: 6, tokens: '15K', color: 'technical' },
            { id: 'analytics', name: 'Analytics', emoji: '📈', role: 'Reporting & tracking', status: 'idle', tasks: 10, tokens: '22K', color: 'analytics' },
            { id: 'link', name: 'Link Builder', emoji: '🔗', role: 'Prospecting & outreach', status: 'idle', tasks: 4, tokens: '12K', color: 'link' },
            { id: 'ecommerce', name: 'E-commerce', emoji: '🛒', role: 'Product & category SEO', status: 'idle', tasks: 3, tokens: '8K', color: 'ecommerce' }
        ];

        const projects = [
            {
                id: 1,
                name: 'Premier Oral & Implant Surgery',
                client: 'Dr. Firas Ali - Ashburn, VA',
                progress: 35,
                status: 'Wave 1 Complete',
                tasks: [
                    { name: 'Client brief created', status: 'completed', time: 'Feb 26', files: [{ name: 'client-brief.md', size: '6KB' }] },
                    { name: '6 landing pages written', status: 'completed', time: 'Feb 26', files: [{ name: 'wave1-landing-pages.md', size: '21KB' }] },
                    { name: 'Competitor analysis', status: 'completed', time: 'Feb 26', files: [{ name: 'tiktech-analysis.md', size: '16KB' }] },
                    { name: 'Wave 2 planning', status: 'pending', time: 'Next' }
                ]
            },
            {
                id: 2,
                name: 'AZ Tech SEO Team',
                client: 'Internal - SEO Agency Build',
                progress: 85,
                status: 'Operational',
                tasks: [
                    { name: '8 agent definitions created', status: 'completed', time: 'Feb 26' },
                    { name: 'Dashboard built', status: 'completed', time: 'Feb 27' },
                    { name: 'SEMrush integration', status: 'pending', time: 'Next' }
                ]
            }
        ];

        const fileContents = {
            'client-brief': '# Premier Oral \u0026 Implant Surgery\\n\\nDr. Firas Ali - Board Certified Oral Surgeon\\n19,000+ anesthesia cases | 17,000+ wisdom teeth | 100,000+ extractions',
            'landing-pages': '# Wave 1 Landing Pages\\n\\n6 SEO-optimized pages for dental implant keywords',
            'tiktech-analysis': '# TikTech Competitive Analysis\\n\\nLocal computer repair competitor research'
        };

        let currentFileContent = '';

        function renderAgents() {
            const list = document.getElementById('agentList');
            list.innerHTML = agents.map(agent => `
                <div class="agent-card" data-agent="${agent.color}" onclick="showAgentDetails('${agent.id}')">
                    <div class="agent-avatar">${agent.emoji}</div>
                    <h3>${agent.name}</h3>
                    <div class="role">${agent.role}</div>
                    <div class="agent-stats">
                        <div class="agent-stat"><span>${agent.tasks}</span> tasks</div>
                        <div class="agent-stat"><span>${agent.tokens}</span> tokens</div>
                    </div>
                </div>
            `).join('');
        }

        function renderProjects() {
            const list = document.getElementById('projectList');
            list.innerHTML = projects.map(project => `
                <div class="project-card" onclick="showProjectDetails(${project.id})">
                    <div class="project-header">
                        <h4>${project.name}</h4>
                        <div class="project-progress">
                            <div class="pct">${project.progress}%</div>
                        </div>
                    </div>
                    <div class="project-meta">
                        <span class="project-tag">${project.client}</span>
                        <span class="project-tag">${project.status}</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${project.progress}%"></div>
                    </div>
                </div>
            `).join('');
        }

        function showAgentDetails(agentId) {
            const agent = agents.find(a => a.id === agentId);
            document.getElementById('modalTitle').textContent = agent.name;
            document.getElementById('modalBody').innerHTML = `
                <div class="detail-label">Role</div>
                <div style="margin-bottom: 1rem">${agent.role}</div>
                <div class="detail-label">Status</div>
                <div style="margin-bottom: 1rem; text-transform: capitalize">${agent.status}</div>
                <div class="detail-label">Performance</div>
                <div>${agent.tasks} tasks completed • ${agent.tokens} tokens used</div>
            `;
            document.getElementById('modal').classList.add('active');
        }

        function showProjectDetails(projectId) {
            const project = projects.find(p => p.id === projectId);
            document.getElementById('modalTitle').textContent = project.name;
            document.getElementById('modalBody').innerHTML = `
                <div class="detail-label">Client</div>
                <div style="margin-bottom: 1rem">${project.client}</div>
                <div class="detail-label">Progress</div>
                <div style="margin-bottom: 1rem">${project.progress}% complete</div>
                <div class="detail-label">Tasks</div>
                <div class="task-list">
                    ${project.tasks.map(task => `
                        <div class="task-item ${task.status}">
                            <div class="task-name">${task.name}</div>
                            <div class="task-meta">${task.time}</div>
                            ${task.files ? `
                            <div class="file-list">
                                ${task.files.map(file => `
                                    <div class="file-item" onclick="viewFile('${file.name}', '${file.name.split('.')[0]}')">
                                        <div class="file-icon">📄</div>
                                        <div class="file-info">
                                            <div class="file-name">${file.name}</div>
                                            <div class="file-size">${file.size}</div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('modal').classList.add('active');
        }

        function viewFile(filename, contentKey) {
            const content = fileContents[contentKey] || 'File content not available';
            currentFileContent = content;
            document.getElementById('fileViewerTitle').textContent = filename;
            document.getElementById('fileContent').textContent = content;
            document.getElementById('fileViewer').classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        function closeFileViewer() { document.getElementById('fileViewer').classList.remove('active'); }

        function copyFileContent() {
            navigator.clipboard.writeText(currentFileContent).then(() => alert('Copied!'));
        }

        function showTab(tab) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.target.closest('.nav-item').classList.add('active');
        }

        document.getElementById('modal').addEventListener('click', e => { if(e.target === e.currentTarget) closeModal(); });

        renderAgents();
        renderProjects();
    </script>
</body>
</html>
