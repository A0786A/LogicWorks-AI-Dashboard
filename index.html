        let currentFileContent = '';

        function renderAgents() {
            const list = document.getElementById('agentList');
            list.innerHTML = agents.map(agent => `
                <div class="agent-item" onclick="showAgentDetails('${agent.id}')">
                    <div class="agent-avatar ${agent.avatarClass}">${agent.avatar}</div>
                    <div class="agent-info">
                        <h3>${agent.name}</h3>
                        <div class="role">${agent.shortRole}</div>
                    </div>
                    <div class="agent-status">
                        <span class="badge ${agent.status}">${agent.status}</span>
                        <div class="meta">${agent.tasksCompleted} tasks</div>
                    </div>
                </div>
            `).join('');
        }

        function renderProjects() {
            const list = document.getElementById('projectList');
            list.innerHTML = projects.map(project => `
                <div class="project-item" onclick="showProjectDetails(${project.id})">
                    <div class="project-header">
                        <h4>${project.name}</h4>
                        <span class="pct">${project.progress}%</span>
                    </div>
                    <div class="project-meta">${project.client} • ${project.status}</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${project.progress}%"></div>
                    </div>
                </div>
            `).join('');
        }

        function showAgentDetails(agentId) {
            const agent = agents.find(a => a.id === agentId);
            if (!agent) return;

            document.getElementById('modalTitle').textContent = agent.name;
            document.getElementById('modalBody').innerHTML = `
                <div class="detail-row">
                    <div class="detail-label">Role</div>
                    <div class="detail-value">${agent.fullRole}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Status</div>
                    <div class="detail-value" style="text-transform: capitalize">${agent.status}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Performance</div>
                    <div class="detail-value">${agent.tasksCompleted} tasks completed • ${agent.tokensUsed} tokens used</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Recent Tasks</div>
                    <div class="task-list">
                        ${agent.recentTasks.map(task => `

                                <div class="task-meta">${task.time}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('modal').classList.add('active');
        }

        function showProjectDetails(projectId) {
            const project = projects.find(p => p.id === projectId);
            if (!project) return;

            document.getElementById('modalTitle').textContent = project.name;
            document.getElementById('modalBody').innerHTML = `
                <div class="detail-row">
                    <div class="detail-label">Client</div>
                    <div class="detail-value">${project.client}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Type</div>
                    <div class="detail-value">${project.type}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Status</div>
                    <div class="detail-value">${project.status}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Progress</div>
                    <div class="detail-value">${project.progress}% complete</div>
                    <div class="progress-bar" style="margin-top: 0.5rem">
                        <div class="progress-fill" style="width: ${project.progress}%"></div>
                    </div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Active Agents</div>
                    <div class="detail-value">${Array.isArray(project.agents) ? project.agents.join(', ') : project.agents}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Tasks</div>
                    <div class="task-list">
                        ${project.tasks.map(task => `
                            <div class="task-item ${task.status}">
                                <div class="task-name">${task.name}</div>
                                <div class="task-meta">${task.time}</div>
                                ${task.files ? `
                                <div class="file-list">
                                    ${task.files.map(file => `
                                        <div class="file-item" onclick="${file.contentKey ? `viewFile('${file.name}', '${file.contentKey}')` : ''}">
                                            <div class="file-header">
                                                <span class="file-name">${file.name}</span>
                                                <span class="file-size">${file.size}</span>
                                            </div>
                                            ${file.contentKey ? '<div class="file-hint">Tap to view full content</div>' : ''}
                                        </div>
                                    `).join('')}
                                </div>
                                ` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('modal').classList.add('active');
        }

        function viewFile(filename, contentKey) {
            const content = fileContents[contentKey];
            if (!content) {
                alert('File content not available in this demo');
                return;
            }
            
            currentFileContent = content;
            document.getElementById('fileViewerTitle').textContent = filename;
            document.getElementById('fileContent').textContent = content;
            document.getElementById('fileViewer').classList.add('active');
        }

        function closeFileViewer() {
            document.getElementById('fileViewer').classList.remove('active');
        }

        function copyFileContent() {
            navigator.clipboard.writeText(currentFileContent).then(() => {
                alert('Content copied to clipboard!');
            }).catch(() => {
                // Fallback for older browsers
                const textarea = document.createElement('textarea');
                textarea.value = currentFileContent;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('Content copied to clipboard!');
            });
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Close modal when clicking outside
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Initialize
        renderAgents();
        renderProjects();
    </script>
